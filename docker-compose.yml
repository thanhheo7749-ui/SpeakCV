services:
  # --- BACKEND ---
  backend:
    build: ./src/backend
    container_name: speakcv_backend
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8000:8000"
    volumes:
      - ./src/backend:/app
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}

  # --- FRONTEND ---
  frontend:
    build: ./src/frontend
    container_name: speakcv_frontend
    ports:
      - "3000:3000"
    volumes:
      - ./src/frontend:/app
      - frontend_node_modules:/app/node_modules
    command: sh -c "rm -rf /app/.next && npm install && npx next dev -H 0.0.0.0"
    environment:
      - NEXT_PUBLIC_API_URL=http://hoangthanhzzz.id.vn:8000
      - NODE_ENV=development

  # --- DATABASE ---
  db:
    image: mysql:8.0
    container_name: speakcv_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: "thanhhoang@123"
      MYSQL_DATABASE: "speakcv"
    volumes:
      - db_data:/var/lib/mysql

volumes:
  frontend_node_modules:
  db_data: