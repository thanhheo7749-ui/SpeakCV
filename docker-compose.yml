services:
  # --- FRONTEND ---
  frontend:
    container_name: speakcv_frontend
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    restart: unless-stopped
    environment:
      - NODE_ENV=production

  # --- BACKEND ---
  backend:
    container_name: speakcv_backend
    build:
      context: ./src/backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    restart: unless-stopped

  # --- DATABASE ---
  db:
    image: mysql:8.0
    container_name: speakcv_mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: speakcv_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    restart: always

volumes:
  mysql_data: